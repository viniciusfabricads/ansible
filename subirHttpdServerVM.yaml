---
# ============================================================================
# Playbook: Instalar e subir o HTTPD na VM vinicius-ssm4 (Amazon Linux 2)
# Conexão: SSH (sem inventory.ini separado)
#
# O primeiro play descobre o IP público da instância e injeta o host
# via add_host. O segundo play conecta via SSH e instala o HTTPD.
#
# Execução:
#   ansible-playbook instalar-httpd-ssh.yaml
#
# Pré-requisitos na máquina de controle:
#   - ansible-galaxy collection install amazon.aws
#   - pip install boto3 botocore
#   - credenciais AWS configuradas
#   - a chave privada vinicius-key.pem acessível (ver var key_local_path)
# ============================================================================

# ========================================================================
# PARTE 1: Descobrir o IP da instância e registrar como host SSH
# ========================================================================
- name: Descobrir a instância e registrar host SSH
  hosts: localhost
  gather_facts: false
  collections:
    - amazon.aws
  vars:
    region: us-east-2
    instance_id: i-0e26cae7240dbd2bb        # vinicius-ssm4
    key_local_path: "./vinicius-key.pem"     # chave privada gerada na criação
    remote_user: ec2-user                    # usuário padrão do Amazon Linux 2

  tasks:
    - name: Buscar dados da instância
      amazon.aws.ec2_instance_info:
        region: "{{ region }}"
        instance_ids:
          - "{{ instance_id }}"
      register: instance_info

    - name: Validar que a instância tem IP público
      ansible.builtin.assert:
        that:
          - instance_info.instances[0].public_ip_address is defined
          - instance_info.instances[0].public_ip_address | length > 0
        fail_msg: "A instância {{ instance_id }} não tem IP público. Verifique se está rodando."

    - name: Registrar a instância como host SSH (inventário embutido)
      ansible.builtin.add_host:
        name: "{{ instance_info.instances[0].public_ip_address }}"
        groups: vm_ssh
        ansible_user: "{{ remote_user }}"
        ansible_ssh_private_key_file: "{{ key_local_path }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    - name: Mostrar o IP descoberto
      ansible.builtin.debug:
        msg: "Conectando em {{ instance_info.instances[0].public_ip_address }} como {{ remote_user }}"

# ========================================================================
# PARTE 2: Instalar e iniciar o HTTPD via SSH
# ========================================================================
- name: Instalar e configurar HTTPD via SSH
  hosts: vm_ssh
  gather_facts: false
  become: true

  tasks:
    - name: Aguardar a instância aceitar conexões SSH
      ansible.builtin.wait_for_connection:
        timeout: 120

    - name: Instalar o pacote httpd
      ansible.builtin.yum:
        name: httpd
        state: present

    - name: Criar página de teste (index.html)
      ansible.builtin.copy:
        content: |
          <html>
            <head><title>vinicius-ssm4</title></head>
            <body>
              <h1>HTTPD instalado via Ansible + SSH</h1>
              <p>Servidor: vinicius-ssm4</p>
            </body>
          </html>
        dest: /var/www/html/index.html
        owner: apache
        group: apache
        mode: '0644'

    - name: Iniciar e habilitar o serviço httpd
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true

    - name: Mostrar resultado
      ansible.builtin.debug:
        msg: "HTTPD instalado e rodando. Acesse via http://{{ inventory_hostname }}"
