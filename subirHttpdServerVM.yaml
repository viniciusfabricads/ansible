---
- name: Instalar httpd na instância via AWS SSM (usando CLI)
  hosts: localhost
  gather_facts: false

  vars:
    instance_id: "i-0f222bd747509d4dd"     # ← Substitua pelo ID da sua instância

  tasks:

    - name: Enviar comando para instalar httpd via SSM
      ansible.builtin.command: >
        aws ssm send-command
        --instance-ids {{ instance_id }}
        --document-name "AWS-RunShellScript"
        --parameters '{"commands":["sudo yum update -y", "sudo yum install httpd -y", "sudo systemctl start httpd", "sudo systemctl enable httpd", "echo \"<h1>Apache instalado com sucesso!</h1>\" > /var/www/html/index.html"]}'
        --region us-east-2
        --output text
      register: ssm_output

    - name: Mostrar resultado do comando SSM
      ansible.builtin.debug:
        var: ssm_output.stdout_lines
