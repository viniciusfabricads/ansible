---
- name: Instalar httpd via AWS SSM Run Command
  hosts: localhost
  gather_facts: false
  collections:
    - amazon.aws

  vars:
    # Coloque aqui o ID da sua instância
    instance_id: "i-0f222bd747509d4dd"

  tasks:

    - name: Instalar httpd usando SSM Run Command
      amazon.aws.ssm_run_command:
        instance_ids:
          - "{{ instance_id }}"
        document_name: "AWS-RunShellScript"
        parameters:
          commands:
            - "sudo yum update -y"
            - "sudo yum install -y httpd"
            - "sudo systemctl start httpd"
            - "sudo systemctl enable httpd"
            - "echo '<h1>Apache instalado via SSM Run Command</h1>' | sudo tee /var/www/html/index.html"
        region: us-east-2
      register: ssm_result

    - name: Mostrar resultado do comando
      ansible.builtin.debug:
        var: ssm_result
