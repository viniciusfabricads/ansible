---
# ============================================================================
# Playbook: Instalar e subir o HTTPD na VM vinicius-ssm3 (Amazon Linux 2)
# Conexão: AWS SSM Session Manager (sem SSH, sem inventory.ini separado)
#
# O inventário é embutido via add_host no primeiro play.
# Execução:  ansible-playbook instalar-httpd-ssm.yaml
#
# Pré-requisitos na máquina de controle (CloudShell já traz a maioria):
#   - ansible-galaxy collection install community.aws amazon.aws
#   - pip install boto3 botocore
#   - session-manager-plugin instalado
#   - credenciais AWS configuradas (env vars, ~/.aws ou role)
# ============================================================================

# ========================================================================
# PARTE 1: Pré-requisitos (bucket S3 + Security Group) + injeção do host
# ========================================================================
- name: Preparar infraestrutura e registrar host SSM
  hosts: localhost
  gather_facts: false
  collections:
    - amazon.aws
    - community.aws
  vars:
    region: us-east-2
    instance_id: i-0f222bd747509d4dd          # vinicius-ssm3 (do print)
    ssm_bucket: vinicius-ssm-ansible-bucket    # precisa ser único globalmente
    vpc_name: vinicius-vpc

  tasks:
    - name: Criar bucket S3 para transferência via SSM
      amazon.aws.s3_bucket:
        name: "{{ ssm_bucket }}"
        region: "{{ region }}"
        state: present

    - name: Buscar a VPC pelo nome
      amazon.aws.ec2_vpc_net_info:
        region: "{{ region }}"
        filters:
          "tag:Name": "{{ vpc_name }}"
      register: vpc_info

    - name: Criar Security Group liberando HTTP (porta 80)
      amazon.aws.ec2_security_group:
        name: vinicius-sg-http
        description: Libera HTTP para o servidor web
        vpc_id: "{{ vpc_info.vpcs[0].vpc_id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports:
              - 80
            cidr_ip: 0.0.0.0/0
            rule_desc: Permite HTTP de qualquer origem
        tags:
          Name: vinicius-sg-http
      register: sg

    - name: Buscar a interface de rede (ENI) da instância
      amazon.aws.ec2_instance_info:
        region: "{{ region }}"
        instance_ids:
          - "{{ instance_id }}"
      register: instance_info

    - name: Associar o Security Group à instância (mantendo os já existentes)
      ansible.builtin.command: >-
        aws ec2 modify-instance-attribute
        --region {{ region }}
        --instance-id {{ instance_id }}
        --groups {{ existing_sgs | join(' ') }} {{ sg.group_id }}
      vars:
        existing_sgs: "{{ instance_info.instances[0].security_groups | map(attribute='group_id') | list }}"
      changed_when: true

    - name: Registrar a instância como host SSM dinamicamente (inventário embutido)
      ansible.builtin.add_host:
        name: "{{ instance_id }}"
        groups: vm_ssm
        ansible_connection: community.aws.aws_ssm
        ansible_aws_ssm_region: "{{ region }}"
        ansible_aws_ssm_bucket_name: "{{ ssm_bucket }}"

# ========================================================================
# PARTE 2: Instalar e iniciar o HTTPD via SSM (sem inventory.ini!)
# ========================================================================
- name: Instalar e configurar HTTPD via SSM
  hosts: vm_ssm
  gather_facts: false
  become: true

  tasks:
    - name: Instalar o pacote httpd
      ansible.builtin.yum:
        name: httpd
        state: present

    - name: Criar página de teste (index.html)
      ansible.builtin.copy:
        content: |
          <html>
            <head><title>vinicius-ssm3</title></head>
            <body>
              <h1>HTTPD instalado via Ansible + SSM</h1>
              <p>Servidor: vinicius-ssm3</p>
            </body>
          </html>
        dest: /var/www/html/index.html
        owner: apache
        group: apache
        mode: '0644'

    - name: Iniciar e habilitar o serviço httpd
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true

    - name: Mostrar resultado
      ansible.builtin.debug:
        msg: "HTTPD instalado e rodando. Acesse via IP público da instância na porta 80."
