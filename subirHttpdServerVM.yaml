---
- name: Instalar e configurar Apache (httpd) na instância vinicius-ssm3
  hosts: vinicius-ssm3
  gather_facts: false
  become: true

  tasks:

    - name: Atualizar todos os pacotes do sistema
      ansible.builtin.yum:
        name: "*"
        state: latest

    - name: Instalar o Apache (httpd)
      ansible.builtin.yum:
        name: httpd
        state: present

    - name: Iniciar e habilitar o serviço httpd
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true

    - name: Criar página de teste do Apache
      ansible.builtin.copy:
        content: |
          <html>
            <head><title>Apache no AWS</title></head>
            <body>
              <h1>Apache instalado com sucesso!</h1>
              <p>Instância: vinicius-ssm3</p>
              <p>Instalado via Ansible + SSM</p>
            </body>
          </html>
        dest: /var/www/html/index.html
        owner: apache
        group: apache
        mode: '0644'

    - name: Verificar status do httpd
      ansible.builtin.command: systemctl is-active httpd
      register: httpd_status
      changed_when: false

    - name: Exibir status do serviço
      ansible.builtin.debug:
        msg: "Status do httpd: {{ httpd_status.stdout }}"
