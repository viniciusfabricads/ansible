---
- name: Criar VM no Microsoft Azure
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - name: azure.azcollection

  vars:
    # ==================== VARIÁVEIS - PERSONALIZE AQUI ====================
    resource_group: "rg-fabricsds-dev"
    location: "brazilsouth"

    vnet_name: "vnet-fabricsds-dev"
    vnet_address_prefix: "10.10.0.0/16"
    subnet_name: "subnet-default"
    subnet_address_prefix: "10.10.1.0/24"

    nsg_name: "nsg-fabricsds-dev"
    
    # Nomes ajustados para a VM de demonstração
    public_ip_name: "pip-vinicius-demonstracao"
    nic_name: "nic-vinicius-demonstracao"
    vm_name: "Vinicius-Demonstracao"

    vm_size: "Standard_B2s"
    admin_username: "azureuser"
    admin_password: "SuaSenhaForte@123"        # Altere para uma senha segura

    image:
      publisher: "Canonical"
      offer: "0001-com-ubuntu-server-jammy"
      sku: "22_04-lts-gen2"
      version: "latest"

    tags:
      Environment: "Demonstracao"
      Projeto: "FabricaDS"
      Owner: "Vinicius"
      CreatedBy: "Ansible"
    # =====================================================================

  tasks:

    - name: Criar Resource Group
      azure.azcollection.azure_rm_resourcegroup:
        name: "{{ resource_group }}"
        location: "{{ location }}"
        tags: "{{ tags }}"

    - name: Criar Virtual Network
      azure.azcollection.azure_rm_virtualnetwork:
        resource_group: "{{ resource_group }}"
        name: "{{ vnet_name }}"
        address_prefixes:
          - "{{ vnet_address_prefix }}"
        tags: "{{ tags }}"

    - name: Criar Subnet
      azure.azcollection.azure_rm_subnet:
        resource_group: "{{ resource_group }}"
        name: "{{ subnet_name }}"
        virtual_network: "{{ vnet_name }}"
        address_prefix: "{{ subnet_address_prefix }}"

    - name: Criar Network Security Group
      azure.azcollection.azure_rm_networksecuritygroup:
        resource_group: "{{ resource_group }}"
        name: "{{ nsg_name }}"
        tags: "{{ tags }}"

    - name: Criar regra de SSH no NSG (porta 22)
      azure.azcollection.azure_rm_securityrule:
        resource_group: "{{ resource_group }}"
        name: "AllowSSH"
        network_security_group: "{{ nsg_name }}"
        protocol: "Tcp"
        source_address_prefix: "*"
        destination_port_range: "22"
        access: "Allow"
        priority: 100
        direction: "Inbound"

    - name: Criar Public IP Address
      azure.azcollection.azure_rm_publicipaddress:
        resource_group: "{{ resource_group }}"
        name: "{{ public_ip_name }}"
        allocation_method: "Static"
        sku: "Standard"
        tags: "{{ tags }}"

    - name: Criar Network Interface (NIC)
      azure.azcollection.azure_rm_networkinterface:
        resource_group: "{{ resource_group }}"
        name: "{{ nic_name }}"
        virtual_network: "{{ vnet_name }}"
        subnet: "{{ subnet_name }}"
        public_ip_address: "{{ public_ip_name }}"
        security_group: "{{ nsg_name }}"
        tags: "{{ tags }}"

    - name: Criar Virtual Machine
      azure.azcollection.azure_rm_virtualmachine:
        resource_group: "{{ resource_group }}"
        name: "{{ vm_name }}"
        vm_size: "{{ vm_size }}"
        admin_username: "{{ admin_username }}"
        admin_password: "{{ admin_password }}"
        ssh_password_enabled: true
        network_interfaces: "{{ nic_name }}"
        image: "{{ image }}"
        tags: "{{ tags }}"
        state: "present"
