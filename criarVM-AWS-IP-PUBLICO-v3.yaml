---
- name: Criar VPC, Subnet Pública e VM com SSH habilitado
  hosts: localhost
  gather_facts: false
  collections:
    - amazon.aws

  vars:
    region: us-east-2
    key_name: vinicius-key            # nome do key pair na AWS
    key_local_path: "./vinicius-key.pem"   # onde salvar a chave privada
    # Para restringir o SSH ao seu IP, troque o valor abaixo por "SEU.IP.AQUI/32"
    ssh_cidr: 0.0.0.0/0

  tasks:

    # ========================== IAM ROLE PARA SSM ==========================
    - name: Criar IAM Role para SSM
      iam_role:
        name: SSMInstanceRole
        assume_role_policy_document: |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": { "Service": "ec2.amazonaws.com" },
                "Action": "sts:AssumeRole"
              }
            ]
          }
        state: present
        create_instance_profile: true
        managed_policies:
          - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

    # ========================== VPC ==========================
    - name: Criar VPC
      ec2_vpc_net:
        name: vinicius-vpc
        cidr_block: 10.0.0.0/16
        region: "{{ region }}"
        state: present
        tags:
          Name: vinicius-vpc
      register: vpc

    # ========================== INTERNET GATEWAY ==========================
    - name: Criar Internet Gateway
      ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        state: present
        tags:
          Name: vinicius-igw
      register: igw

    # ========================== SUBNET ==========================
    - name: Criar Subnet
      ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: 10.0.1.0/24
        az: us-east-2a
        region: "{{ region }}"
        state: present
        tags:
          Name: vinicius-subnet-public
      register: subnet

    # ========================== ROUTE TABLE + ROTA PARA INTERNET ==========================
    - name: Criar Route Table
      ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        tags:
          Name: vinicius-rt-public
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"
        subnets:
          - "{{ subnet.subnet.id }}"
      register: route_table

    # ========================== KEY PAIR (CHAVE SSH) ==========================
    - name: Criar Key Pair para acesso SSH
      amazon.aws.ec2_key:
        name: "{{ key_name }}"
        region: "{{ region }}"
        state: present
      register: keypair

    - name: Salvar a chave privada localmente (somente quando recém-criada)
      ansible.builtin.copy:
        content: "{{ keypair.key.private_key }}"
        dest: "{{ key_local_path }}"
        mode: '0400'
      when: keypair.key.private_key is defined

    # ========================== SECURITY GROUP (SSH + HTTP) ==========================
    - name: Criar Security Group liberando SSH (22) e HTTP (80)
      amazon.aws.ec2_security_group:
        name: vinicius-sg-ssh-http
        description: Libera SSH e HTTP para a VM
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports:
              - 22
            cidr_ip: "{{ ssh_cidr }}"
            rule_desc: Permite SSH
          - proto: tcp
            ports:
              - 80
            cidr_ip: 0.0.0.0/0
            rule_desc: Permite HTTP de qualquer origem
        tags:
          Name: vinicius-sg-ssh-http
      register: sg

    # ========================== BUSCAR AMI ==========================
    - name: Buscar AMI Amazon Linux 2 mais recente
      ec2_ami_info:
        region: "{{ region }}"
        owners: ["amazon"]
        filters:
          name: "amzn2-ami-hvm-*-x86_64-gp2"
          architecture: "x86_64"
          root-device-type: "ebs"
          virtualization-type: "hvm"
      register: al2_amis

    - name: Definir AMI mais recente
      set_fact:
        latest_al2_ami_id: "{{ (al2_amis.images | sort(attribute='creation_date', reverse=true))[0].image_id }}"

    # ========================== CRIAR INSTÂNCIA ==========================
    - name: Criar Instância EC2 com IP Público, SSH e IAM Role SSM
      ec2_instance:
        name: vinicius-ssm4
        image_id: "{{ latest_al2_ami_id }}"
        instance_type: t2.micro
        region: "{{ region }}"
        vpc_subnet_id: "{{ subnet.subnet.id }}"
        key_name: "{{ key_name }}"
        security_groups:
          - "{{ sg.group_id }}"
        state: present
        tags:
          Name: vinicius-ssm4
          Environment: Demo
        iam_instance_profile: SSMInstanceRole
        wait: true
        network_interfaces:
          - assign_public_ip: true
            delete_on_termination: true
            groups:
              - "{{ sg.group_id }}"
      register: ec2

    - name: Mostrar resumo
      debug:
        msg:
          - "AMI utilizada: {{ latest_al2_ami_id }}"
          - "VPC ID: {{ vpc.vpc.id }}"
          - "Subnet ID: {{ subnet.subnet.id }}"
          - "Internet Gateway ID: {{ igw.gateway_id }}"
          - "Security Group ID: {{ sg.group_id }}"
          - "Key Pair: {{ key_name }} (chave salva em {{ key_local_path }})"
          - "Instância ID: {{ ec2.instances[0].instance_id }}"
          - "IP Público: {{ ec2.instances[0].public_ip_address | default('N/A') }}"
          - "Conectar via: ssh -i {{ key_local_path }} ec2-user@{{ ec2.instances[0].public_ip_address | default('N/A') }}"
