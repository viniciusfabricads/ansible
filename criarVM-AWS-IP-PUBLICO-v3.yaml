---
- name: Criar VPC, Subnet Pública e VM com SSH habilitado
  hosts: localhost
  gather_facts: false
  collections:
    - amazon.aws

  vars:
    region: us-east-2
    key_name: vinicius-key            # nome do key pair na AWS
    # Para restringir o SSH ao seu IP, troque o valor abaixo por "SEU.IP.AQUI/32"
    ssh_cidr: 0.0.0.0/0

  tasks:

    # ========================== IAM ROLE PARA SSM ==========================
    - name: Criar IAM Role para SSM
      iam_role:
        name: SSMInstanceRole
        assume_role_policy_document: |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": { "Service": "ec2.amazonaws.com" },
                "Action": "sts:AssumeRole"
              }
            ]
          }
        state: present
        create_instance_profile: true
        managed_policies:
          - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

    # ========================== VPC ==========================
    - name: Criar VPC
      ec2_vpc_net:
        name: vinicius-vpc
        cidr_block: 10.0.0.0/16
        region: "{{ region }}"
        state: present
        tags:
          Name: vinicius-vpc
      register: vpc

    # ========================== INTERNET GATEWAY ==========================
    - name: Criar Internet Gateway
      ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        state: present
        tags:
          Name: vinicius-igw
      register: igw

    # ========================== SUBNET ==========================
    - name: Criar Subnet
      ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: 10.0.1.0/24
        az: us-east-2a
        region: "{{ region }}"
        state: present
        tags:
          Name: vinicius-subnet-public
      register: subnet

    # ========================== ROUTE TABLE + ROTA PARA INTERNET ==========================
    - name: Criar Route Table
      ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        tags:
          Name: vinicius-rt-public
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"
        subnets:
          - "{{ subnet.subnet.id }}"
      register: route_table

    # ========================== KEY PAIR (CHAVE SSH) ==========================
    # Ambiente de demonstração efêmero: forçamos uma chave NOVA a cada execução.
    # A AWS só retorna a chave privada no momento da criação; por isso apagamos
    # o key pair existente antes de recriar, garantindo que o output traga a chave.
    - name: Remover key pair existente (garante geração de chave nova)
      amazon.aws.ec2_key:
        name: "{{ key_name }}"
        region: "{{ region }}"
        state: absent

    - name: Criar Key Pair novo para acesso SSH
      amazon.aws.ec2_key:
        name: "{{ key_name }}"
        region: "{{ region }}"
        state: present
      register: keypair

    # ========================== SECURITY GROUP (SSH + HTTP) ==========================
    - name: Criar Security Group liberando SSH (22) e HTTP (80)
      amazon.aws.ec2_security_group:
        name: vinicius-sg-ssh-http
        description: Libera SSH e HTTP para a VM
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports:
              - 22
            cidr_ip: "{{ ssh_cidr }}"
            rule_desc: Permite SSH
          - proto: tcp
            ports:
              - 80
            cidr_ip: 0.0.0.0/0
            rule_desc: Permite HTTP de qualquer origem
        tags:
          Name: vinicius-sg-ssh-http
      register: sg

    # ========================== BUSCAR AMI ==========================
    - name: Buscar AMI Amazon Linux 2 mais recente
      ec2_ami_info:
        region: "{{ region }}"
        owners: ["amazon"]
        filters:
          name: "amzn2-ami-hvm-*-x86_64-gp2"
          architecture: "x86_64"
          root-device-type: "ebs"
          virtualization-type: "hvm"
      register: al2_amis

    - name: Definir AMI mais recente
      set_fact:
        latest_al2_ami_id: "{{ (al2_amis.images | sort(attribute='creation_date', reverse=true))[0].image_id }}"

    # ========================== CRIAR INSTÂNCIA ==========================
    - name: Criar Instância EC2 com IP Público, SSH e IAM Role SSM
      ec2_instance:
        name: vinicius-ssm4
        image_id: "{{ latest_al2_ami_id }}"
        instance_type: t2.micro
        region: "{{ region }}"
        vpc_subnet_id: "{{ subnet.subnet.id }}"
        key_name: "{{ key_name }}"
        security_groups:
          - "{{ sg.group_id }}"
        state: present
        tags:
          Name: vinicius-ssm4
          Environment: Demo
        iam_instance_profile: SSMInstanceRole
        wait: true
        network_interfaces:
          - assign_public_ip: true
            delete_on_termination: true
            groups:
              - "{{ sg.group_id }}"
      register: ec2

    # ========================== EXIBIR A CHAVE PRIVADA NO OUTPUT ==========================
    # Dupla garantia contra truncamento:
    #   (1) debug: var          -> preserva o conteudo bruto melhor que debug: msg
    #   (2) set_stats           -> expoe a chave na aba "Artifacts" do job, fora do log
    # Copie o bloco do -----BEGIN ao -----END (inclusive) para o campo
    # "SSH Private Key" de uma Machine Credential no Automation Controller.
    - name: Guardar a chave privada em um fato
      ansible.builtin.set_fact:
        ssh_private_key: "{{ keypair.key.private_key }}"
      when: keypair.key.private_key is defined

    - name: ">>> CHAVE PRIVADA SSH - copie para a Machine Credential <<<"
      ansible.builtin.debug:
        var: ssh_private_key
      when: keypair.key.private_key is defined

    - name: Expor a chave tambem como artefato do job (aba Artifacts)
      ansible.builtin.set_stats:
        data:
          ssh_private_key: "{{ keypair.key.private_key }}"
        per_host: false
      when: keypair.key.private_key is defined

    - name: Aviso caso a chave não tenha sido gerada
      ansible.builtin.debug:
        msg: >-
          ATENCAO: a chave privada nao foi retornada. Isso ocorre se o key pair
          ja existia. Confira se a task de remocao do key pair foi executada.
      when: keypair.key.private_key is not defined

    # ========================== RESUMO ==========================
    - name: Mostrar resumo
      debug:
        msg:
          - "AMI utilizada: {{ latest_al2_ami_id }}"
          - "VPC ID: {{ vpc.vpc.id }}"
          - "Subnet ID: {{ subnet.subnet.id }}"
          - "Internet Gateway ID: {{ igw.gateway_id }}"
          - "Security Group ID: {{ sg.group_id }}"
          - "Key Pair: {{ key_name }} (chave exibida na task acima)"
          - "Instancia ID: {{ ec2.instances[0].instance_id }}"
          - "IP Publico: {{ ec2.instances[0].public_ip_address | default('N/A') }}"
          - "Usuario SSH: ec2-user"
