---
# ==========================================================================
# PLAY 1 - Descobrir a VM criada e adicioná-la ao inventário dinamicamente
# --------------------------------------------------------------------------
# Pré-requisitos no Job Template (Automation Controller / versão web):
#   - Credential AWS         -> autentica o play 1 na AWS (ec2_instance_info)
#   - Credential Machine     -> fornece usuário (ec2-user) + chave SSH ao play 2
# Não há nenhuma referência a arquivo .pem: a plataforma injeta tudo.
# ==========================================================================
- name: Localizar a instância EC2 e montar inventário em runtime
  hosts: localhost
  gather_facts: false
  collections:
    - amazon.aws

  vars:
    region: us-east-2
    instance_name: vinicius-ssm4   # mesma tag Name usada no playbook de criação

  tasks:
    - name: Buscar a instância em execução pela tag Name
      amazon.aws.ec2_instance_info:
        region: "{{ region }}"
        filters:
          "tag:Name": "{{ instance_name }}"
          instance-state-name: ["running"]
      register: ec2_info

    - name: Falhar de forma clara se nenhuma instância for encontrada
      ansible.builtin.fail:
        msg: >-
          Nenhuma instância em execução com a tag Name={{ instance_name }}
          foi encontrada na região {{ region }}. Rode o playbook de criação antes.
      when: ec2_info.instances | length == 0

    - name: Adicionar a VM ao inventário em tempo de execução
      ansible.builtin.add_host:
        name: "{{ ec2_info.instances[0].public_ip_address }}"
        groups: webservers
        # Usuário e chave SSH vêm da Machine Credential do Job Template.
        # StrictHostKeyChecking desabilitado porque a VM é recém-criada.
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

    - name: Aguardar a porta 22 (SSH) ficar acessível
      ansible.builtin.wait_for:
        host: "{{ ec2_info.instances[0].public_ip_address }}"
        port: 22
        timeout: 300
        state: started

    - name: Mostrar o alvo identificado
      ansible.builtin.debug:
        msg: "VM alvo: {{ ec2_info.instances[0].public_ip_address }} ({{ instance_name }})"

# ==========================================================================
# PLAY 2 - Instalar e configurar o Apache HTTPD na VM
# ==========================================================================
- name: Instalar e configurar Apache HTTPD
  hosts: webservers
  become: true
  # gather_facts desligado: o Python 3.7 padrao do Amazon Linux 2 nao atende
  # ao minimo exigido pelo ansible-core (3.8+). Instalamos um Python compativel
  # antes de coletar facts.
  gather_facts: false

  vars:
    site_message: "Apache HTTPD provisionado via Red Hat Ansible Automation Platform"

  tasks:
    # ---- Preparar um Python compativel (Amazon Linux 2 traz apenas 3.7) ----
    # O modulo 'raw' roda comando bruto via SSH, sem depender de Python no alvo.
    - name: Instalar Python 3.8 via Amazon Linux Extras
      ansible.builtin.raw: amazon-linux-extras install -y python3.8
      changed_when: false

    - name: Apontar o Ansible para o Python 3.8 recem-instalado
      ansible.builtin.set_fact:
        ansible_python_interpreter: /usr/bin/python3.8

    - name: Coletar facts agora com o Python compativel
      ansible.builtin.setup:

    - name: Instalar o pacote httpd (chamada direta ao yum)
      # No Amazon Linux 2, o yum depende do Python do sistema, nao do 3.8 que
      # instalamos. Chamar o yum diretamente evita o conflito de interpretador
      # ("Could not detect which major revision of dnf is in use").
      ansible.builtin.command: yum install -y httpd
      register: yum_httpd
      changed_when: "'Nothing to do' not in yum_httpd.stdout and 'already installed' not in yum_httpd.stdout"

    - name: Iniciar e habilitar o httpd (systemctl direto)
      ansible.builtin.command: "{{ item }}"
      loop:
        - systemctl enable httpd
        - systemctl start httpd
      changed_when: false

    - name: Publicar uma página inicial de teste
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        owner: apache
        group: apache
        mode: '0644'
        content: |
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <title>Apache HTTPD - OK</title>
          </head>
          <body>
            <h1>{{ site_message }}</h1>
            <p>Host: {{ ansible_hostname }}</p>
            <p>Distribuicao: {{ ansible_distribution }} {{ ansible_distribution_version }}</p>
          </body>
          </html>
      notify: Reiniciar httpd

    - name: Verificar localmente que o Apache responde (HTTP 200)
      ansible.builtin.uri:
        url: http://localhost/
        status_code: 200
        return_content: false
      register: http_check
      retries: 5
      delay: 3
      until: http_check.status == 200

    - name: Resumo final
      ansible.builtin.debug:
        msg:
          - "Apache HTTPD instalado e em execução em {{ inventory_hostname }}"
          - "Acesse no navegador: http://{{ inventory_hostname }}/"
          - "Status HTTP retornado localmente: {{ http_check.status }}"

  handlers:
    - name: Reiniciar httpd
      ansible.builtin.command: systemctl restart httpd
      changed_when: false
