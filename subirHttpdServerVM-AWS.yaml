---
# ============================================================================
# Playbook: Instalar e subir o HTTPD na VM vinicius-ssm4 via SSM Run Command
# Conexão: API do SSM (boto3) — SEM SSH, SEM chave, SEM session-manager-plugin
#
# Ideal para AWX/AAP: roda inteiramente em localhost contra a API da AWS.
# Não depende de arquivos persistentes nem de Credentials de SSH.
#
# Pré-requisitos no Execution Environment do AWX:
#   - collection amazon.aws
#   - boto3 / botocore (já presentes, pois os módulos AWS funcionam)
#   - AWS Credential configurado no Job Template (chave de acesso ou role)
#
# Requisito na instância (já atendido):
#   - IAM Role SSMInstanceRole com a policy AmazonSSMManagedInstanceCore
#   - Agente SSM rodando (padrão no Amazon Linux 2)
# ============================================================================

- name: Instalar HTTPD via SSM Run Command
  hosts: localhost
  gather_facts: false
  collections:
    - amazon.aws
  vars:
    region: us-east-2
    instance_id: i-0e26cae7240dbd2bb        # vinicius-ssm4
    vpc_name: vinicius-vpc

  tasks:

    # ---- Garante que a porta 80 está liberada (para acessar a página) ----
    - name: Buscar a VPC pelo nome
      amazon.aws.ec2_vpc_net_info:
        region: "{{ region }}"
        filters:
          "tag:Name": "{{ vpc_name }}"
      register: vpc_info

    - name: Criar Security Group liberando HTTP (porta 80)
      amazon.aws.ec2_security_group:
        name: vinicius-sg-http
        description: Libera HTTP para o servidor web
        vpc_id: "{{ vpc_info.vpcs[0].vpc_id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports:
              - 80
            cidr_ip: 0.0.0.0/0
            rule_desc: Permite HTTP de qualquer origem
        tags:
          Name: vinicius-sg-http
      register: sg

    - name: Buscar dados da instância
      amazon.aws.ec2_instance_info:
        region: "{{ region }}"
        instance_ids:
          - "{{ instance_id }}"
      register: instance_info

    - name: Associar o SG de HTTP à ENI (mantendo os existentes)
      amazon.aws.ec2_eni:
        eni_id: "{{ instance_info.instances[0].network_interfaces[0].network_interface_id }}"
        region: "{{ region }}"
        security_groups: "{{ existing_sgs + [sg.group_id] }}"
        state: present
      vars:
        existing_sgs: "{{ instance_info.instances[0].security_groups | map(attribute='group_id') | list }}"

    # ---- Instala o HTTPD via SSM Run Command, chamando boto3 diretamente ----
    # Não usa módulo especializado nem CLI: gera um script Python que usa o
    # boto3 já presente no Execution Environment e o executa no localhost.
    - name: Gerar script Python que dispara o SSM Run Command
      ansible.builtin.copy:
        dest: /tmp/ssm_run_httpd.py
        mode: '0755'
        content: |
          import sys, time, boto3

          region = "{{ region }}"
          instance_id = "{{ instance_id }}"

          ssm = boto3.client("ssm", region_name=region)

          commands = [
              "yum install -y httpd",
              "echo '<html><head><title>vinicius-ssm4</title></head>"
              "<body><h1>HTTPD instalado via Ansible + SSM Run Command</h1>"
              "<p>Servidor: vinicius-ssm4</p></body></html>' > /var/www/html/index.html",
              "systemctl enable httpd",
              "systemctl start httpd",
          ]

          resp = ssm.send_command(
              InstanceIds=[instance_id],
              DocumentName="AWS-RunShellScript",
              Comment="Instalar e subir o HTTPD via Ansible",
              Parameters={"commands": commands},
          )
          command_id = resp["Command"]["CommandId"]
          print("CommandId:", command_id)

          # Aguarda a conclusão
          for _ in range(30):
              time.sleep(5)
              inv = ssm.get_command_invocation(
                  CommandId=command_id, InstanceId=instance_id
              )
              status = inv["Status"]
              print("Status:", status)
              if status in ("Success", "Failed", "Cancelled", "TimedOut"):
                  print("---- STDOUT ----")
                  print(inv.get("StandardOutputContent", ""))
                  print("---- STDERR ----")
                  print(inv.get("StandardErrorContent", ""))
                  if status != "Success":
                      sys.exit(1)
                  break
          else:
              print("Tempo esgotado aguardando o comando.")
              sys.exit(1)

    - name: Executar o script (usa o boto3 do Execution Environment)
      ansible.builtin.command: "{{ ansible_python_interpreter | default('python3') }} /tmp/ssm_run_httpd.py"
      register: ssm_result
      changed_when: true

    - name: Mostrar saída do Run Command
      ansible.builtin.debug:
        var: ssm_result.stdout_lines

    - name: Mostrar como acessar
      ansible.builtin.debug:
        msg: "Acesse: http://{{ instance_info.instances[0].public_ip_address | default('N/A') }}"
