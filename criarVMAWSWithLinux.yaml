---
- name: Criar VPC, Subnet, Security Group, IGW e VM no AWS EC2 com IP Público e usuário vinicius
  hosts: localhost
  gather_facts: no
  collections:
    - amazon.aws
  tasks:
    - name: Criar VPC básica
      ec2_vpc_net:
        name: vinicius
        cidr_block: 10.0.0.0/16
        region: us-east-2
        state: present
        tags:
          Name: basic-vpc
      register: vpc

    - name: Criar Subnet na VPC (com IP público automático)
      ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: 10.0.1.0/24
        az: us-east-2a
        region: us-east-2
        state: present
        map_public_ip_on_launch: true
        tags:
          Name: basic-subnet
      register: subnet

    - name: Criar Security Group (permitir SSH)
      ec2_security_group:
        name: vinicius-sg
        description: "Security group para VM básica - SSH liberado (demo)"
        vpc_id: "{{ vpc.vpc.id }}"
        region: us-east-2
        state: present
        rules:
          - proto: tcp
            ports:
              - 22
            cidr_ip: 0.0.0.0/0
            rule_desc: "SSH from anywhere (demo only)"
      register: sg

    - name: Criar Internet Gateway
      ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: us-east-2
        state: present
        tags:
          Name: vinicius-igw
      register: igw

    - name: Criar Tabela de Roteamento e associar à Subnet
      ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: us-east-2
        tags:
          Name: vinicius-rt
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"
        subnets:
          - "{{ subnet.subnet.id }}"
      register: rt

    - name: Buscar AMIs do Amazon Linux 2
      ec2_ami_info:
        region: us-east-2
        owners:
          - amazon
        filters:
          "name": "amzn2-ami-hvm-*-x86_64-gp2"
          "architecture": "x86_64"
          "root-device-type": "ebs"
          "virtualization-type": "hvm"
      register: al2_amis

    - name: Definir variável para a AMI mais recente
      set_fact:
        latest_al2_ami_id: "{{ (al2_amis.images | sort(attribute='creation_date', reverse=true))[0].image_id }}"

    - name: Lançar instância EC2 com IP Público e usuário vinicius
      ec2_instance:
        name: vinicius
        image_id: "{{ latest_al2_ami_id }}"
        instance_type: t2.micro
        region: us-east-2
        vpc_subnet_id: "{{ subnet.subnet.id }}"
        security_groups:
          - vinicius-sg
        state: present
        tags:
          Name: basic-vm
        # === Garantir IP Público ===
        network:
          assign_public_ip: true
        user_data: |
          #!/bin/bash
          set -e
          echo "=== Configurando usuário vinicius ==="

          if ! id vinicius &>/dev/null; then
            useradd -m -s /bin/bash vinicius
            echo "vinicius:demonstracao" | chpasswd
            usermod -aG wheel vinicius
            echo "Usuário 'vinicius' criado com sucesso."
          fi

          # Habilitar login por senha no SSH
          sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config 2>/dev/null || true
          systemctl restart sshd || true

          echo "=== Configuração concluída ==="
      register: ec2

    - name: Mostrar informações da VM criada
      debug:
        msg:
          - "AMI ID: {{ latest_al2_ami_id }}"
          - "VPC ID: {{ vpc.vpc.id }}"
          - "Subnet ID: {{ subnet.subnet.id }}"
          - "Security Group: {{ sg.group_id }}"
          - "Instância ID: {{ ec2.instances[0].instance_id }}"
          - "IP Público: {{ ec2.instances[0].public_ip_address | default('Ainda não disponível - verifique no console AWS') }}"
          - ""
          - ">>> Para acessar via SSH:"
          - "ssh vinicius@{{ ec2.instances[0].public_ip_address | default('<IP_PUBLICO>') }}"
          - "Senha: demonstracao"
