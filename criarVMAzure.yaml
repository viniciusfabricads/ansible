---
# ============================================================================
# Playbook 1/2: Criar VM Ubuntu no Azure com rede, IP público e login por senha
# Equivalente ao playbook de criação da AWS, adaptado para o Azure.
#
# Mapeamento AWS -> Azure:
#   VPC            -> Virtual Network (VNet)
#   Subnet         -> Subnet
#   Security Group -> Network Security Group (NSG)
#   IP Público     -> Public IP Address (recurso explícito)
#   (tudo dentro de) Resource Group
#
# Pré-requisitos no Execution Environment / máquina de controle:
#   - ansible-galaxy collection install azure.azcollection
#   - pip install -r ~/.ansible/collections/ansible_collections/azure/azcollection/requirements.txt
#   - Autenticação Azure: Service Principal via variáveis de ambiente
#     (AZURE_CLIENT_ID, AZURE_SECRET, AZURE_TENANT, AZURE_SUBSCRIPTION_ID)
#     ou um Azure Credential configurado no Job Template do AWX.
# ============================================================================

- name: Criar VM Ubuntu no Azure com IP público e login por senha
  hosts: localhost
  gather_facts: false
  collections:
    - azure.azcollection

  vars:
    resource_group: vinicius-rg
    location: eastus
    vnet_name: vinicius-vnet
    subnet_name: vinicius-subnet
    nsg_name: vinicius-nsg
    public_ip_name: vinicius-pip
    nic_name: vinicius-nic
    vm_name: vinicius-vm
    vm_size: Standard_B1s
    admin_user: azureuser
    # Senha do usuário admin (atende à política do Azure: 12+ chars, com
    # maiúscula, minúscula, número e símbolo). Troque por uma senha sua.
    admin_password: "Vinicius@2026!"
    # Para restringir o SSH ao seu IP, troque "*" por "SEU.IP.AQUI"
    ssh_source: "*"

  tasks:

    # ===== Instala a biblioteca Python faltante no EE (em runtime) =====
    # O EE oficial traz quase todo o SDK do Azure, mas falta a
    # azure-mgmt-hybridcompute exigida pela versão da collection.
    # Esta task roda antes das tasks Azure e instala a lib no interpretador
    # que o Ansible está usando (--user para não exigir permissão de root).
    - name: Garantir a biblioteca azure-mgmt-hybridcompute
      ansible.builtin.pip:
        name: azure-mgmt-hybridcompute
        extra_args: --user
      ignore_errors: true

    # ========================== RESOURCE GROUP ==========================
    - name: Criar Resource Group
      azure.azcollection.azure_rm_resourcegroup:
        name: "{{ resource_group }}"
        location: "{{ location }}"
        state: present

    # ========================== VNET ==========================
    - name: Criar Virtual Network (VNet)
      azure.azcollection.azure_rm_virtualnetwork:
        resource_group: "{{ resource_group }}"
        name: "{{ vnet_name }}"
        address_prefixes: "10.0.0.0/16"
        state: present

    # ========================== SUBNET ==========================
    - name: Criar Subnet
      azure.azcollection.azure_rm_subnet:
        resource_group: "{{ resource_group }}"
        name: "{{ subnet_name }}"
        virtual_network: "{{ vnet_name }}"
        address_prefix: "10.0.1.0/24"
        state: present

    # ========================== NSG (SSH + HTTP) ==========================
    - name: Criar Network Security Group liberando SSH (22) e HTTP (80)
      azure.azcollection.azure_rm_securitygroup:
        resource_group: "{{ resource_group }}"
        name: "{{ nsg_name }}"
        rules:
          - name: Permitir-SSH
            protocol: Tcp
            destination_port_range: 22
            source_address_prefix: "{{ ssh_source }}"
            access: Allow
            priority: 100
            direction: Inbound
          - name: Permitir-HTTP
            protocol: Tcp
            destination_port_range: 80
            source_address_prefix: "*"
            access: Allow
            priority: 110
            direction: Inbound
        state: present

    # ========================== IP PÚBLICO ==========================
    - name: Criar IP Público
      azure.azcollection.azure_rm_publicipaddress:
        resource_group: "{{ resource_group }}"
        name: "{{ public_ip_name }}"
        allocation_method: Static
        sku: Standard
        state: present
      register: pip

    # ========================== NIC (placa de rede) ==========================
    - name: Criar Network Interface (NIC) ligando subnet + IP + NSG
      azure.azcollection.azure_rm_networkinterface:
        resource_group: "{{ resource_group }}"
        name: "{{ nic_name }}"
        virtual_network: "{{ vnet_name }}"
        subnet_name: "{{ subnet_name }}"
        security_group: "{{ nsg_name }}"
        ip_configurations:
          - name: ipconfig1
            public_ip_address_name: "{{ public_ip_name }}"
            primary: true
        state: present

    # ========================== VM ==========================
    - name: Criar a VM Linux (Ubuntu) com autenticação por senha
      azure.azcollection.azure_rm_virtualmachine:
        resource_group: "{{ resource_group }}"
        name: "{{ vm_name }}"
        vm_size: "{{ vm_size }}"
        admin_username: "{{ admin_user }}"
        admin_password: "{{ admin_password }}"
        ssh_password_enabled: true
        network_interfaces: "{{ nic_name }}"
        managed_disk_type: Standard_LRS
        # Imagem Ubuntu Server 22.04 LTS (Jammy). Pacote web = apache2.
        image:
          offer: 0001-com-ubuntu-server-jammy
          publisher: Canonical
          sku: 22_04-lts-gen2
          version: latest
        state: present
      register: vm

    - name: Mostrar resumo
      ansible.builtin.debug:
        msg:
          - "Resource Group: {{ resource_group }}"
          - "VM: {{ vm_name }}"
          - "IP Público: {{ pip.state.ip_address }}"
          - "Usuário: {{ admin_user }}"
          - "Conectar via: ssh {{ admin_user }}@{{ pip.state.ip_address }} (use a senha definida)"
