---
- name: Excluir VM e infraestrutura AWS (com varredura de dependências da VPC)
  hosts: localhost
  gather_facts: false
  collections:
    - amazon.aws

  vars:
    region: us-east-2
    instance_name: vinicius-ssm4
    key_name: vinicius-key
    vpc_name: vinicius-vpc
    # Controle do escopo da limpeza:
    #   true  -> remove TODA a infraestrutura (VPC e tudo dentro dela, key pair, IAM role)
    #   false -> remove APENAS a instancia EC2, preservando a rede para reuso
    remover_infra_completa: true

  tasks:

    # ========================== TERMINAR A INSTÂNCIA EC2 ==========================
    - name: Buscar a instância pela tag Name
      amazon.aws.ec2_instance_info:
        region: "{{ region }}"
        filters:
          "tag:Name": "{{ instance_name }}"
          instance-state-name: ["running", "stopped", "pending", "stopping"]
      register: ec2_info

    - name: Terminar a instância EC2 (se existir)
      amazon.aws.ec2_instance:
        region: "{{ region }}"
        instance_ids: "{{ ec2_info.instances | map(attribute='instance_id') | list }}"
        state: absent
        wait: true
      when: ec2_info.instances | length > 0

    - name: Informar se nenhuma instância foi encontrada
      ansible.builtin.debug:
        msg: "Nenhuma instância com a tag Name={{ instance_name }} foi encontrada."
      when: ec2_info.instances | length == 0

    # ==========================================================================
    # A PARTIR DAQUI: somente quando remover_infra_completa = true
    # Varredura dinamica da VPC removendo TUDO na ordem correta de dependencias.
    # ==========================================================================

    # ---- Identificar a VPC ----
    - name: Buscar a VPC pelo nome
      amazon.aws.ec2_vpc_net_info:
        region: "{{ region }}"
        filters:
          "tag:Name": "{{ vpc_name }}"
      register: vpc_info
      when: remover_infra_completa | bool

    - name: Definir o ID da VPC
      ansible.builtin.set_fact:
        vpc_id: "{{ vpc_info.vpcs[0].vpc_id if (vpc_info.vpcs | default([]) | length > 0) else '' }}"
      when: remover_infra_completa | bool

    - name: Avisar se a VPC não foi encontrada (nada de infra a remover)
      ansible.builtin.debug:
        msg: "VPC '{{ vpc_name }}' não encontrada. Nenhuma infraestrutura de rede a remover."
      when:
        - remover_infra_completa | bool
        - vpc_id | default('') | length == 0

    # ---- 1. Instâncias remanescentes na VPC (rede de segurança) ----
    - name: Buscar instâncias ainda na VPC
      amazon.aws.ec2_instance_info:
        region: "{{ region }}"
        filters:
          vpc-id: "{{ vpc_id }}"
          instance-state-name: ["running", "stopped", "pending", "stopping"]
      register: vpc_instances
      when:
        - remover_infra_completa | bool
        - vpc_id | default('') | length > 0

    - name: Terminar instâncias remanescentes
      amazon.aws.ec2_instance:
        region: "{{ region }}"
        instance_ids: "{{ vpc_instances.instances | map(attribute='instance_id') | list }}"
        state: absent
        wait: true
      when:
        - remover_infra_completa | bool
        - vpc_id | default('') | length > 0
        - vpc_instances.instances | default([]) | length > 0

    # ---- 2. Interfaces de Rede / ENIs (CAUSA do DependencyViolation) ----
    - name: Buscar ENIs na VPC
      amazon.aws.ec2_eni_info:
        region: "{{ region }}"
        filters:
          vpc-id: "{{ vpc_id }}"
      register: enis
      when:
        - remover_infra_completa | bool
        - vpc_id | default('') | length > 0

    - name: Remover ENIs remanescentes
      amazon.aws.ec2_eni:
        region: "{{ region }}"
        eni_id: "{{ item.id }}"
        state: absent
        force_detach: true
      loop: "{{ enis.network_interfaces | default([]) }}"
      when:
        - remover_infra_completa | bool
        - vpc_id | default('') | length > 0
        - item.attachment is not defined or item.attachment.status == 'detached'
      ignore_errors: true

    # ---- 3. Security Groups (exceto o default) ----
    - name: Buscar Security Groups da VPC
      amazon.aws.ec2_security_group_info:
        region: "{{ region }}"
        filters:
          vpc-id: "{{ vpc_id }}"
      register: sgs
      when:
        - remover_infra_completa | bool
        - vpc_id | default('') | length > 0

    - name: Remover Security Groups (pula o 'default')
      amazon.aws.ec2_security_group:
        region: "{{ region }}"
        group_id: "{{ item.group_id }}"
        state: absent
      loop: "{{ sgs.security_groups | default([]) }}"
      when:
        - remover_infra_completa | bool
        - vpc_id | default('') | length > 0
        - item.group_name != 'default'
      ignore_errors: true

    # ---- 4. Subnets ----
    - name: Buscar Subnets da VPC
      amazon.aws.ec2_vpc_subnet_info:
        region: "{{ region }}"
        filters:
          vpc-id: "{{ vpc_id }}"
      register: subnets
      when:
        - remover_infra_completa | bool
        - vpc_id | default('') | length > 0

    - name: Remover Subnets
      amazon.aws.ec2_vpc_subnet:
        region: "{{ region }}"
        vpc_id: "{{ vpc_id }}"
        cidr: "{{ item.cidr_block }}"
        state: absent
      loop: "{{ subnets.subnets | default([]) }}"
      when:
        - remover_infra_completa | bool
        - vpc_id | default('') | length > 0
      ignore_errors: true

    # ---- 5. Route Tables (exceto a main) ----
    - name: Buscar Route Tables da VPC
      amazon.aws.ec2_vpc_route_table_info:
        region: "{{ region }}"
        filters:
          vpc-id: "{{ vpc_id }}"
      register: rts
      when:
        - remover_infra_completa | bool
        - vpc_id | default('') | length > 0

    - name: Remover Route Tables (pula a principal/main)
      amazon.aws.ec2_vpc_route_table:
        region: "{{ region }}"
        route_table_id: "{{ item.id }}"
        vpc_id: "{{ vpc_id }}"
        lookup: id
        state: absent
      loop: "{{ rts.route_tables | default([]) }}"
      when:
        - remover_infra_completa | bool
        - vpc_id | default('') | length > 0
        - item.associations | default([]) | selectattr('main', 'defined') | selectattr('main') | list | length == 0
      ignore_errors: true

    # ---- 6. Internet Gateway ----
    - name: Buscar Internet Gateways da VPC
      amazon.aws.ec2_vpc_igw_info:
        region: "{{ region }}"
        filters:
          attachment.vpc-id: "{{ vpc_id }}"
      register: igws
      when:
        - remover_infra_completa | bool
        - vpc_id | default('') | length > 0

    - name: Remover Internet Gateway
      amazon.aws.ec2_vpc_igw:
        region: "{{ region }}"
        vpc_id: "{{ vpc_id }}"
        state: absent
      when:
        - remover_infra_completa | bool
        - vpc_id | default('') | length > 0
        - igws.internet_gateways | default([]) | length > 0
      ignore_errors: true

    # ---- 7. A VPC ----
    - name: Remover a VPC (agora sem dependências)
      amazon.aws.ec2_vpc_net:
        vpc_id: "{{ vpc_id }}"
        region: "{{ region }}"
        state: absent
      when:
        - remover_infra_completa | bool
        - vpc_id | default('') | length > 0

    # ---- 8. Key Pair ----
    - name: Remover Key Pair
      amazon.aws.ec2_key:
        name: "{{ key_name }}"
        region: "{{ region }}"
        state: absent
      when: remover_infra_completa | bool

    # ---- 9. IAM Role + Instance Profile ----
    - name: Remover IAM Role e Instance Profile (SSM)
      amazon.aws.iam_role:
        name: SSMInstanceRole
        region: "{{ region }}"
        state: absent
        delete_instance_profile: true
      when: remover_infra_completa | bool
      ignore_errors: true

    # ========================== RESUMO ==========================
    - name: Resumo da limpeza
      ansible.builtin.debug:
        msg:
          - "Instancias (tag) removidas: {{ ec2_info.instances | length }}"
          - "Infra completa removida: {{ remover_infra_completa }}"
          - "{{ 'VPC ' ~ vpc_id ~ ' e dependencias removidas.' if (remover_infra_completa | bool and (vpc_id | default('') | length > 0)) else 'Rede preservada ou VPC nao encontrada.' }}"
