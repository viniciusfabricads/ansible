---
- name: Excluir VM e infraestrutura AWS criada (limpeza do ambiente de demo)
  hosts: localhost
  gather_facts: false
  collections:
    - amazon.aws

  vars:
    region: us-east-2
    instance_name: vinicius-ssm4
    key_name: vinicius-key
    # Controle do escopo da limpeza:
    #   true  -> remove TODA a infraestrutura (VPC, subnet, IGW, route table, SG, key pair, IAM role)
    #   false -> remove APENAS a instancia EC2, preservando a rede para reuso
    remover_infra_completa: true

  tasks:

    # ========================== TERMINAR A INSTÂNCIA EC2 ==========================
    - name: Buscar a instância pela tag Name
      amazon.aws.ec2_instance_info:
        region: "{{ region }}"
        filters:
          "tag:Name": "{{ instance_name }}"
          instance-state-name: ["running", "stopped", "pending", "stopping"]
      register: ec2_info

    - name: Terminar a instância EC2 (se existir)
      amazon.aws.ec2_instance:
        region: "{{ region }}"
        instance_ids: "{{ ec2_info.instances | map(attribute='instance_id') | list }}"
        state: absent
        wait: true
      when: ec2_info.instances | length > 0

    - name: Informar se nenhuma instância foi encontrada
      ansible.builtin.debug:
        msg: "Nenhuma instância com a tag Name={{ instance_name }} foi encontrada."
      when: ec2_info.instances | length == 0

    # ========================== A PARTIR DAQUI: SO COM remover_infra_completa=true ==========================
    # A ordem abaixo segue o INVERSO da criacao, respeitando as dependencias da AWS.

    # ---- Descobrir a VPC pelo nome (necessario para remover os recursos filhos) ----
    - name: Buscar a VPC pelo nome
      amazon.aws.ec2_vpc_net_info:
        region: "{{ region }}"
        filters:
          "tag:Name": vinicius-vpc
      register: vpc_info
      when: remover_infra_completa | bool

    - name: Definir o ID da VPC (se encontrada)
      ansible.builtin.set_fact:
        vpc_id: "{{ vpc_info.vpcs[0].vpc_id }}"
      when:
        - remover_infra_completa | bool
        - vpc_info.vpcs | length > 0

    # ---- Security Group ----
    - name: Remover Security Group
      amazon.aws.ec2_security_group:
        name: vinicius-sg-ssh-http
        region: "{{ region }}"
        state: absent
      when: remover_infra_completa | bool
      ignore_errors: true

    # ---- Route Table ----
    - name: Buscar Route Table pela tag
      amazon.aws.ec2_vpc_route_table_info:
        region: "{{ region }}"
        filters:
          "tag:Name": vinicius-rt-public
      register: rt_info
      when: remover_infra_completa | bool

    - name: Remover Route Table
      amazon.aws.ec2_vpc_route_table:
        region: "{{ region }}"
        route_table_id: "{{ item.id }}"
        vpc_id: "{{ vpc_id }}"
        lookup: id
        state: absent
      loop: "{{ rt_info.route_tables | default([]) }}"
      when:
        - remover_infra_completa | bool
        - vpc_id is defined

    # ---- Subnet ----
    - name: Remover Subnet
      amazon.aws.ec2_vpc_subnet:
        region: "{{ region }}"
        vpc_id: "{{ vpc_id }}"
        cidr: 10.0.1.0/24
        state: absent
      when:
        - remover_infra_completa | bool
        - vpc_id is defined

    # ---- Internet Gateway ----
    - name: Buscar Internet Gateway da VPC
      amazon.aws.ec2_vpc_igw_info:
        region: "{{ region }}"
        filters:
          attachment.vpc-id: "{{ vpc_id }}"
      register: igw_info
      when:
        - remover_infra_completa | bool
        - vpc_id is defined

    - name: Remover Internet Gateway
      amazon.aws.ec2_vpc_igw:
        region: "{{ region }}"
        vpc_id: "{{ vpc_id }}"
        state: absent
      when:
        - remover_infra_completa | bool
        - vpc_id is defined

    # ---- VPC ----
    - name: Remover VPC
      amazon.aws.ec2_vpc_net:
        name: vinicius-vpc
        cidr_block: 10.0.0.0/16
        region: "{{ region }}"
        state: absent
      when:
        - remover_infra_completa | bool
        - vpc_id is defined

    # ---- Key Pair ----
    - name: Remover Key Pair
      amazon.aws.ec2_key:
        name: "{{ key_name }}"
        region: "{{ region }}"
        state: absent
      when: remover_infra_completa | bool

    # ---- IAM Role + Instance Profile ----
    - name: Remover IAM Role e Instance Profile (SSM)
      amazon.aws.iam_role:
        name: SSMInstanceRole
        region: "{{ region }}"
        state: absent
        delete_instance_profile: true
      when: remover_infra_completa | bool
      ignore_errors: true

    # ========================== RESUMO ==========================
    - name: Resumo da limpeza
      ansible.builtin.debug:
        msg:
          - "Instancias removidas: {{ ec2_info.instances | length }}"
          - "Infra completa removida: {{ remover_infra_completa }}"
          - "{{ 'VPC e recursos de rede removidos.' if (remover_infra_completa | bool and vpc_id is defined) else 'Rede preservada ou VPC nao encontrada.' }}"
