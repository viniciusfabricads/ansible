---
- name: Criar VPC, Subnet Pública e VM com suporte ao SSM Session Manager
  hosts: localhost
  gather_facts: false
  collections:
    - amazon.aws

  tasks:

    # ========================== IAM ROLE PARA SSM ==========================
    - name: Criar IAM Role para SSM
      iam_role:
        name: SSMInstanceRole
        assume_role_policy_document: |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": { "Service": "ec2.amazonaws.com" },
                "Action": "sts:AssumeRole"
              }
            ]
          }
        state: present
        create_instance_profile: true
        managed_policies:
          - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

    # ========================== VPC ==========================
    - name: Criar VPC
      ec2_vpc_net:
        name: vinicius-vpc
        cidr_block: 10.0.0.0/16
        region: us-east-2
        state: present
        tags:
          Name: vinicius-vpc
      register: vpc

    # ========================== INTERNET GATEWAY ==========================
    - name: Criar Internet Gateway
      ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: us-east-2
        state: present
        tags:
          Name: vinicius-igw
      register: igw

    # ========================== SUBNET ==========================
    - name: Criar Subnet
      ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: 10.0.1.0/24
        az: us-east-2a
        region: us-east-2
        state: present
        tags:
          Name: vinicius-subnet-public
      register: subnet

    # ========================== ROUTE TABLE + ROTA PARA INTERNET ==========================
    - name: Criar Route Table
      ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: us-east-2
        tags:
          Name: vinicius-rt-public
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"
        subnets:
          - "{{ subnet.subnet.id }}"
      register: route_table

    # ========================== BUSCAR AMI ==========================
    - name: Buscar AMI Amazon Linux 2 mais recente
      ec2_ami_info:
        region: us-east-2
        owners: ["amazon"]
        filters:
          name: "amzn2-ami-hvm-*-x86_64-gp2"
          architecture: "x86_64"
          root-device-type: "ebs"
          virtualization-type: "hvm"
      register: al2_amis

    - name: Definir AMI mais recente
      set_fact:
        latest_al2_ami_id: "{{ (al2_amis.images | sort(attribute='creation_date', reverse=true))[0].image_id }}"

    # ========================== CRIAR INSTÂNCIA COM IP PÚBLICO ==========================
    - name: Criar Instância EC2 com IP Público e IAM Role SSM
      ec2_instance:
        name: vinicius-ssm2
        image_id: "{{ latest_al2_ami_id }}"
        instance_type: t2.micro
        region: us-east-2
        vpc_subnet_id: "{{ subnet.subnet.id }}"
        assign_public_ip: true                    # ← IP Público automático
        state: present
        tags:
          Name: vinicius-ssm2
          Environment: Demo
        iam_instance_profile: SSMInstanceRole
        wait: true
      register: ec2

    - name: Mostrar resumo do que foi criado
      debug:
        msg:
          - "AMI utilizada: {{ latest_al2_ami_id }}"
          - "VPC ID: {{ vpc.vpc.id }}"
          - "Subnet ID: {{ subnet.subnet.id }}"
          - "Internet Gateway ID: {{ igw.gateway_id }}"
          - "Instância ID: {{ ec2.instances[0].instance_id }}"
          - "IP Público: {{ ec2.instances[0].public_ip_address | default('N/A') }}"
